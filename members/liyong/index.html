<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PPT 演示 - AI Agent Training</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        #canvas-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        canvas { max-width: 100%; max-height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .nav { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 10; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(5px); }
        .btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 16px; cursor: pointer; border-radius: 5px; font-size: 16px; transition: 0.2s; }
        .btn:hover { background: rgba(255,255,255,0.4); }
        .btn:disabled { opacity: 0.3; cursor: default; }
        #page-info { color: #ccc; font-size: 14px; align-self: center; min-width: 60px; text-align: center; }
        .loader { position: absolute; color: #fff; font-size: 20px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        .click-area { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 5; cursor: pointer; }
        .click-left { left: 0; }
        .click-right { right: 0; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div id="canvas-container">
        <div class="loader" id="loader">正在加载高清文档...</div>
        <canvas id="pdf-render"></canvas>
        
        <!-- Touch/Click areas for easy navigation -->
        <div class="click-area click-left" onclick="prevPage()"></div>
        <div class="click-area click-right" onclick="nextPage()"></div>

        <div class="nav">
            <button class="btn" id="prev" onclick="prevPage()">❮ 上一页</button>
            <span id="page-info">0 / 0</span>
            <button class="btn" id="next" onclick="nextPage()">下一页 ❯</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const url = 'AI_Agent_Training.pdf';
        let pdfDoc = null, pageNum = 1, scale = 2; // Scale 2 for retina/high-res
        const canvas = document.getElementById('pdf-render');
        const ctx = canvas.getContext('2d');

        function renderPage(num) {
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: scale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = { canvasContext: ctx, viewport: viewport };
                page.render(renderContext).promise.then(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('page-info').innerText = `${num} / ${pdfDoc.numPages}`;
                    document.getElementById('prev').disabled = (num <= 1);
                    document.getElementById('next').disabled = (num >= pdfDoc.numPages);
                });
            });
        }

        function prevPage() { if (pageNum <= 1) return; pageNum--; renderPage(pageNum); }
        function nextPage() { if (pageNum >= pdfDoc.numPages) return; pageNum++; renderPage(pageNum); }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevPage();
            if (e.key === 'ArrowRight') nextPage();
        });

        pdfjsLib.getDocument(url).promise.then(pdf => {
            pdfDoc = pdf;
            renderPage(pageNum);
        }).catch(err => {
            document.getElementById('loader').innerHTML = "加载失败: " + err.message;
        });
    </script>
</body>
</html>
